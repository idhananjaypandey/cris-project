<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Employee List</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>

<div class="container">

    <h2>Employee List</h2>

    <a href="/upload" class="top-btn">Add Employee</a>

    <table>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Role</th>
            <th>File</th>
            <th>Action</th>
        </tr>

        <tr th:each="e : ${list}">
            <td th:text="${e.id}"></td>
            <td th:text="${e.name}"></td>
            <td th:text="${e.email}"></td>
            <td th:text="${e.role}"></td>

            <td>
                <a th:href="@{'/uploads/' + ${e.fileName}}" target="_blank" class="pdf-link">
                    View PDF
                </a>
            </td>

            <td>
                <a th:href="@{'/edit/' + ${e.id}}">
                    <button class="edit-btn">Edit</button>
                </a>

                <a th:href="@{'/delete/' + ${e.id}}"
                   onclick="return confirm('Are you sure you want to delete this employee?')">
                    <button class="delete-btn">Delete</button>
                </a>
            </td>
        </tr>
    </table>

</div>

</body>
</html>
